backend = "glx";
glx-no-stencil = true;
glx-copy-from-front = false;
glx-swap-method = 2;

# Opacity
#active-opacity = 1;
#inactive-opacity = 1;
#frame-opacity = 1;
inactive-opacity-override = false;
blur-background = false;

blur-method = "dual_kawase";
blur-strength = 5;

# Shadow
shadow = true;
shadow-radius = 12;
shadow-offset-x = -5;
shadow-offset-y = -5;
shadow-opacity = 0.5;

# Fading
fading = true;
fade-delta = 4;
no-fading-openclose = false;

fade-exclude = [ ];

# Window type settings
wintypes:
{
		dock = {
				shadow = false;
		};
};

#opacity-rule = [
#    "90:class_g = 'Rofi'",
#    "90:class_g = 'st' && focused",
#    "80:class_g = 'st' && !focused"
#];

unredir-if-possible = true;
#unredir-if-possible-exclude = [
#  "class_g = 'looking-glass-client' && !focused"
#]


# Other
refresh-rate = 0;
vsync = true;
xrender-sync-fence = true;
