window:
  padding:
    x: 10
    y: 10
  class:
    instance: Alacritty
    general: Alacritty
  opacity: 1

scrolling:
  history: 250
  multiplier: 3

cursor:
  style:
    shape: Underline
    blinking: Off

font:
  normal:
    family: JetBrainsMono Nerd Font 
    style: Regular

  bold:
    family: JetBrainsMono Nerd Font
    style: Bold

  italic:
    family: JetBrainsMono Nerd Font
    style: Italic

  bold_italic:
    family: JetBrainsMono Nerd Font
    style: Bold Italic
  draw_bold_text_with_bright_colors: true

  size: 11

import:
  - ~/.config/alacritty/catppuccin-mocha.yml

shell:
  program: /usr/bin/zsh
